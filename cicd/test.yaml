.test:
  stage: test
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS || $CI_COMMIT_TAG != null'
      when: never
    - if: '$CI_COMMIT_REF_NAME != "main"'

test-stdx:
  image: registry.gitlab.com/kobolds-io/stdx/zig-base-image:latest
  extends: .test
  script:
    - cd /workspace
    - zig build test
